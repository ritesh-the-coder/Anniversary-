<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Love Story ❤️</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', cursive;
    background: black;
    color: white;
    overflow-x: hidden;
    text-align: center;
}

/* Intro Screen */
#intro {
    position: fixed;
    width: 100%;
    height: 100%;
    background: black;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    z-index: 10;
}

button {
    padding: 15px 30px;
    font-size: 20px;
    border: none;
    border-radius: 30px;
    background: #ff4da6;
    color: white;
    cursor: pointer;
    box-shadow: 0 0 20px pink;
}

/* Main Content */
.container {
    padding: 20px;
    display: none;
}

h1 {
    color: #ff4da6;
    animation: glow 2s infinite alternate;
}

@keyframes glow {
    from { text-shadow: 0 0 10px pink; }
    to { text-shadow: 0 0 25px #ff1a8c; }
}

/* Typing Effect */
#text {
    margin-top: 20px;
    font-size: 17px;
    line-height: 1.7;
    padding: 15px;
}

/* Image */
img {
    width: 80%;
    max-width: 300px;
    border-radius: 20px;
    margin-top: 20px;
    box-shadow: 0 0 20px pink;
}

/* Hearts */
.heart {
    position: fixed;
    bottom: 0;
    color: pink;
    animation: float 5s linear infinite;
}

@keyframes float {
    0% {transform: translateY(0);}
    100% {transform: translateY(-100vh);}
}
</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
    <h1>Our Story ❤️</h1>
    <button onclick="start()">Start 💘</button>
</div>

<!-- MAIN -->
<div class="container" id="main">

<h1>Happy 1st Month Anniversary ❤️</h1>

<div id="text"></div>

<img src="palchin1.jpg">

</div>

<!-- MUSIC -->
<audio id="music" loop>
<source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3">
</audio>

<script>

let text = `My Babe ❤️,

It’s been one month with you… and honestly, it feels like the most beautiful part of my life 💫  

Before you came into my world, everything felt normal… but after you, everything became special.  
Every moment, every conversation, every smile — it all started to matter more 💖  

Darling, you have no idea how much you mean to me.  
The way you talk, the way you smile, even your little attitude… I love everything about you 😭❤️  

I may not be perfect, but one thing I promise —  
I will always try my best to keep you happy 💞  

Talking to you… those late-night chats… those random laughs…  
they have become my favorite part of the day 💕  

You are my peace, my happiness, my everything ❤️  

Happy 1st Month Anniversary, my love 💋  
This is just the beginning…  

I love you sooo much, my darling ❤️  
Forever yours 💖`;

let i = 0;

function typeWriter() {
    if (i < text.length) {
        document.getElementById("text").innerHTML += text.charAt(i);
        i++;
        setTimeout(typeWriter, 35);
    }
}

function start() {
    document.getElementById("intro").style.display = "none";
    document.getElementById("main").style.display = "block";
    document.getElementById("music").play();
    typeWriter();
    hearts();
}

function hearts() {
    setInterval(() => {
        let heart = document.createElement("div");
        heart.innerHTML = "💖";
        heart.className = "heart";
        heart.style.left = Math.random() * 100 + "vw";
        heart.style.fontSize = Math.random() * 20 + 15 + "px";
        document.body.appendChild(heart);

        setTimeout(() => heart.remove(), 5000);
    }, 300);
}

</script>

</body>
</html>
